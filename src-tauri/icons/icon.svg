  <ellipse cx="256" cy="230" rx="125" ry="45" fill="none" stroke="#1e40af" stroke-width="3" stroke-opacity="0.12"/>
  <line x1="131" y1="285" x2="381" y2="285" stroke="#1e40af" stroke-width="3" stroke-opacity="0.25"/>
  <ellipse cx="256" cy="285" rx="125" ry="45" fill="none" stroke="#1e40af" stroke-width="3" stroke-opacity="0.12"/>
