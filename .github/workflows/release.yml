name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pages: write

jobs:
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Frontend tests
        run: npm run test

  test-postgres:
    name: Postgres ${{ matrix.pg_version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pg_version: ["14", "15", "16", "17", "18"]
    services:
      postgres:
        image: postgres:${{ matrix.pg_version }}
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev librsvg2-dev libappindicator3-dev patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Run unit + Postgres integration tests
        env:
          TEST_POSTGRES_URL: "postgres://test:test@localhost:5432/testdb"
        run: |
          cargo test --manifest-path src-tauri/Cargo.toml --lib
          cargo test --manifest-path src-tauri/Cargo.toml --test postgres_integration

  test-mysql:
    name: MySQL ${{ matrix.mysql_version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mysql_version: ["8.0", "8.4"]
    services:
      mysql:
        image: mysql:${{ matrix.mysql_version }}
        env:
          MYSQL_ROOT_PASSWORD: test
          MYSQL_DATABASE: testdb
          MYSQL_USER: test
          MYSQL_PASSWORD: test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev librsvg2-dev libappindicator3-dev patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Run MySQL integration tests
        env:
          TEST_MYSQL_URL: "mysql://root:test@localhost:3306/testdb"
        run: cargo test --manifest-path src-tauri/Cargo.toml --test mysql_integration

  test-mariadb:
    name: MariaDB ${{ matrix.mariadb_version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mariadb_version: ["10.11", "11.4"]
    services:
      mariadb:
        image: mariadb:${{ matrix.mariadb_version }}
        env:
          MARIADB_ROOT_PASSWORD: test
          MARIADB_DATABASE: testdb
          MARIADB_USER: test
          MARIADB_PASSWORD: test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev librsvg2-dev libappindicator3-dev patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Run MariaDB integration tests
        env:
          TEST_MARIADB_URL: "mysql://root:test@localhost:3306/testdb"
        run: cargo test --manifest-path src-tauri/Cargo.toml --test mariadb_integration

  test-cockroachdb:
    name: CockroachDB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start CockroachDB
        run: |
          docker run -d --name crdb -p 26257:26257 cockroachdb/cockroach:latest start-single-node --insecure
          for i in $(seq 1 30); do
            if docker exec crdb cockroach sql --insecure -e "SELECT 1" >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          docker exec crdb cockroach sql --insecure -e "CREATE DATABASE testdb;"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev librsvg2-dev libappindicator3-dev patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Run CockroachDB integration tests
        env:
          TEST_COCKROACHDB_URL: "postgres://root@localhost:26257/testdb?sslmode=disable"
        run: cargo test --manifest-path src-tauri/Cargo.toml --test cockroachdb_integration

  test-tidb:
    name: TiDB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start TiDB
        run: |
          docker run -d --name tidb -p 4000:4000 pingcap/tidb:latest
          for i in $(seq 1 30); do
            if mysql -h 127.0.0.1 -P 4000 -u root --skip-password -e "SELECT 1" >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          mysql -h 127.0.0.1 -P 4000 -u root --skip-password -e "CREATE DATABASE testdb;"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev librsvg2-dev libappindicator3-dev patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Run TiDB integration tests
        env:
          TEST_TIDB_URL: "mysql://root@localhost:4000/testdb"
        run: cargo test --manifest-path src-tauri/Cargo.toml --test tidb_integration

  test-sqlite:
    name: SQLite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev librsvg2-dev libappindicator3-dev patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Run SQLite integration tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --test sqlite_integration

  test-cassandra:
    name: Cassandra
    runs-on: ubuntu-latest
    services:
      cassandra:
        image: cassandra:4.1
        ports:
          - 9042:9042
        options: >-
          --health-cmd "cqlsh -e 'describe cluster'"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 10
          --health-start-period 60s
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev librsvg2-dev libappindicator3-dev patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Run Cassandra integration tests
        env:
          TEST_CASSANDRA_HOST: "127.0.0.1"
          TEST_CASSANDRA_PORT: "9042"
        run: cargo test --manifest-path src-tauri/Cargo.toml --test cassandra_integration

  test-scylladb:
    name: ScyllaDB
    runs-on: ubuntu-latest
    services:
      scylladb:
        image: scylladb/scylla:6.2
        ports:
          - 9042:9042
        options: >-
          --health-cmd "cqlsh -e 'describe cluster'"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 15
          --health-start-period 90s
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev librsvg2-dev libappindicator3-dev patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Run ScyllaDB integration tests
        env:
          TEST_CASSANDRA_HOST: "127.0.0.1"
          TEST_CASSANDRA_PORT: "9042"
        run: cargo test --manifest-path src-tauri/Cargo.toml --test cassandra_integration

  release:
    name: Build & Release (${{ matrix.platform }})
    needs: [test-frontend, test-postgres, test-mysql, test-mariadb, test-cockroachdb, test-tidb, test-sqlite, test-cassandra, test-scylladb]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "Tablio v__VERSION__"
          releaseBody: |
            ## Tablio v__VERSION__

            Database management tool for Postgres, MySQL, and SQLite.

            See the assets below for installers and binaries.
            - **Windows**: `.msi` installer or `.exe` NSIS
            - **macOS**: `.dmg` (Intel and Apple Silicon)
            - **Linux**: `.deb` (Debian/Ubuntu), `.AppImage` (portable)
          releaseDraft: true
          prerelease: ${{ contains(github.ref, '-') }}
          args: ${{ matrix.args }}

  publish-apt:
    name: Publish APT repository
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: source

      - name: Setup gh-pages working directory
        run: |
          REPO_URL="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          if git ls-remote --exit-code --heads "$REPO_URL" gh-pages >/dev/null 2>&1; then
            git clone --depth 1 --branch gh-pages "$REPO_URL" gh-pages
          else
            mkdir -p gh-pages
            pushd gh-pages
            git init -b gh-pages
            git remote add origin "$REPO_URL"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            echo "# Tablio APT Repository" > README.md
            git add README.md
            git commit -m "Initialize gh-pages branch"
            git push origin gh-pages
            popd
          fi
          mkdir -p gh-pages/apt/pool gh-pages/apt/dists/stable/main/binary-amd64
          touch gh-pages/.nojekyll

      - name: Extract version
        id: version
        run: echo "version=$(grep '^version' source/src-tauri/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')" >> "$GITHUB_OUTPUT"

      - name: Download .deb from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v${VERSION}"
          echo "Looking for .deb in release $TAG..."
          for i in $(seq 1 30); do
            ASSETS=$(gh release view "$TAG" --repo "${{ github.repository }}" --json assets --jq '.assets[].name' 2>/dev/null || true)
            if echo "$ASSETS" | grep -q '\.deb$'; then
              echo "Found .deb asset(s):"
              echo "$ASSETS" | grep '\.deb$'
              break
            fi
            echo "Waiting for .deb asset... (attempt $i/30)"
            sleep 30
          done
          gh release download "$TAG" --repo "${{ github.repository }}" --pattern "*.deb" --dir gh-pages/apt/pool
          echo "Downloaded:"
          ls -la gh-pages/apt/pool/

      - name: Import GPG key
        run: |
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          echo "allow-loopback-pinentry" > ~/.gnupg/gpg-agent.conf
          echo "pinentry-mode loopback" > ~/.gnupg/gpg.conf
          gpgconf --kill gpg-agent || true
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          GPG_KEY_ID=$(gpg --list-secret-keys --keyid-format LONG 2>/dev/null | grep '^sec' | head -1 | awk '{print $2}' | cut -d'/' -f2)
          echo "GPG_KEY_ID=$GPG_KEY_ID" >> "$GITHUB_ENV"
          echo "Using GPG key: $GPG_KEY_ID"

      - name: Export public key
        run: gpg --armor --export "$GPG_KEY_ID" > gh-pages/apt/key.gpg

      - name: Generate APT metadata and sign
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          cd gh-pages/apt

          dpkg-scanpackages --multiversion pool > dists/stable/main/binary-amd64/Packages
          gzip -k -f dists/stable/main/binary-amd64/Packages

          printf '%s\n' \
            "Origin: Tablio" \
            "Label: Tablio" \
            "Suite: stable" \
            "Codename: stable" \
            "Architectures: amd64" \
            "Components: main" \
            "Description: Tablio APT repository" \
            > dists/stable/Release

          apt-ftparchive release dists/stable >> dists/stable/Release

          echo "$GPG_PASSPHRASE" > /tmp/gpg-pass

          gpg --batch --yes --pinentry-mode loopback --passphrase-file /tmp/gpg-pass \
            --default-key "$GPG_KEY_ID" -abs -o dists/stable/Release.gpg dists/stable/Release

          gpg --batch --yes --pinentry-mode loopback --passphrase-file /tmp/gpg-pass \
            --default-key "$GPG_KEY_ID" --clearsign -o dists/stable/InRelease dists/stable/Release

          rm -f /tmp/gpg-pass

          echo "APT metadata generated successfully:"
          ls -la dists/stable/
          ls -la dists/stable/main/binary-amd64/

      - name: Create install instructions
        run: |
          printf '%s\n' \
            '<!DOCTYPE html>' \
            '<html><head><title>Tablio APT Repository</title></head>' \
            '<body>' \
            '<h1>Tablio APT Repository</h1>' \
            '<pre>' \
            'curl -fsSL https://dasunnimantha.github.io/tablio/apt/key.gpg | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/tablio.gpg' \
            'echo "deb https://dasunnimantha.github.io/tablio/apt stable main" | sudo tee /etc/apt/sources.list.d/tablio.list' \
            'sudo apt update' \
            'sudo apt install tablio' \
            '</pre>' \
            '</body></html>' \
            > gh-pages/apt/index.html

      - name: Deploy to GitHub Pages
        run: |
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to deploy"
          else
            git commit -m "Update APT repo for v${{ steps.version.outputs.version }}"
            git push origin gh-pages
            echo "Deployed successfully"
          fi
