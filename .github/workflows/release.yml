name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pages: write

jobs:
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "npm"

      - run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Frontend tests
        run: npm run test

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "npm"

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test

      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7

  test-postgres:
    name: Postgres ${{ matrix.pg_version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pg_version: ["14", "15", "16", "17", "18"]
    services:
      postgres:
        image: postgres:${{ matrix.pg_version }}
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev librsvg2-dev libappindicator3-dev patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Run unit + Postgres integration tests
        env:
          TEST_POSTGRES_URL: "postgres://test:test@localhost:5432/testdb"
        run: |
          cargo test --manifest-path src-tauri/Cargo.toml --lib
          cargo test --manifest-path src-tauri/Cargo.toml --test postgres_integration

  test-mysql:
    name: MySQL ${{ matrix.mysql_version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mysql_version: ["8.0", "8.4"]
    services:
      mysql:
        image: mysql:${{ matrix.mysql_version }}
        env:
          MYSQL_ROOT_PASSWORD: test
          MYSQL_DATABASE: testdb
          MYSQL_USER: test
          MYSQL_PASSWORD: test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev librsvg2-dev libappindicator3-dev patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Run MySQL integration tests
        env:
          TEST_MYSQL_URL: "mysql://root:test@localhost:3306/testdb"
        run: cargo test --manifest-path src-tauri/Cargo.toml --test mysql_integration

  test-mariadb:
    name: MariaDB ${{ matrix.mariadb_version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mariadb_version: ["10.11", "11.4"]
    services:
      mariadb:
        image: mariadb:${{ matrix.mariadb_version }}
        env:
          MARIADB_ROOT_PASSWORD: test
          MARIADB_DATABASE: testdb
          MARIADB_USER: test
          MARIADB_PASSWORD: test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev librsvg2-dev libappindicator3-dev patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Run MariaDB integration tests
        env:
          TEST_MARIADB_URL: "mysql://root:test@localhost:3306/testdb"
        run: cargo test --manifest-path src-tauri/Cargo.toml --test mariadb_integration

  test-mssql:
    name: SQL Server ${{ matrix.mssql_version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mssql_version: ["2019", "2022"]
        include:
          - mssql_version: "2019"
            mssql_image: "mcr.microsoft.com/mssql/server:2019-latest"
          - mssql_version: "2022"
            mssql_image: "mcr.microsoft.com/mssql/server:2022-latest"
    services:
      mssql:
        image: ${{ matrix.mssql_image }}
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "Str0ng_Passw0rd!"
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U SA -P 'Str0ng_Passw0rd!' -C -Q 'SELECT 1' || /opt/mssql-tools/bin/sqlcmd -S localhost -U SA -P 'Str0ng_Passw0rd!' -Q 'SELECT 1'"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 10
          --health-start-period 30s
    steps:
      - uses: actions/checkout@v6

      - name: Create test database
        run: |
          for i in $(seq 1 30); do
            if docker exec $(docker ps -q --filter ancestor=${{ matrix.mssql_image }}) /opt/mssql-tools18/bin/sqlcmd -S localhost -U SA -P 'Str0ng_Passw0rd!' -C -Q "SELECT 1" 2>/dev/null || \
               docker exec $(docker ps -q --filter ancestor=${{ matrix.mssql_image }}) /opt/mssql-tools/bin/sqlcmd -S localhost -U SA -P 'Str0ng_Passw0rd!' -Q "SELECT 1" 2>/dev/null; then
              echo "SQL Server is ready"
              break
            fi
            echo "Waiting for SQL Server... (attempt $i/30)"
            sleep 2
          done
          CONTAINER_ID=$(docker ps -q --filter ancestor=${{ matrix.mssql_image }})
          docker exec "$CONTAINER_ID" bash -c "/opt/mssql-tools18/bin/sqlcmd -S localhost -U SA -P 'Str0ng_Passw0rd!' -C -Q 'CREATE DATABASE testdb' 2>/dev/null || /opt/mssql-tools/bin/sqlcmd -S localhost -U SA -P 'Str0ng_Passw0rd!' -Q 'CREATE DATABASE testdb'"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev librsvg2-dev libappindicator3-dev patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Run MSSQL integration tests
        env:
          TEST_MSSQL_URL: "mssql://SA:Str0ng_Passw0rd!@localhost:1433/testdb"
        run: cargo test --manifest-path src-tauri/Cargo.toml --test mssql_integration

  test-cockroachdb:
    name: CockroachDB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Start CockroachDB
        run: |
          docker run -d --name crdb -p 26257:26257 cockroachdb/cockroach:latest start-single-node --insecure
          for i in $(seq 1 30); do
            if docker exec crdb cockroach sql --insecure -e "SELECT 1" >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          docker exec crdb cockroach sql --insecure -e "CREATE DATABASE testdb;"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev librsvg2-dev libappindicator3-dev patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Run CockroachDB integration tests
        env:
          TEST_COCKROACHDB_URL: "postgres://root@localhost:26257/testdb?sslmode=disable"
        run: cargo test --manifest-path src-tauri/Cargo.toml --test cockroachdb_integration

  test-tidb:
    name: TiDB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Start TiDB
        run: |
          docker run -d --name tidb -p 4000:4000 pingcap/tidb:latest
          for i in $(seq 1 30); do
            if mysql -h 127.0.0.1 -P 4000 -u root --skip-password -e "SELECT 1" >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          mysql -h 127.0.0.1 -P 4000 -u root --skip-password -e "CREATE DATABASE testdb;"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev librsvg2-dev libappindicator3-dev patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Run TiDB integration tests
        env:
          TEST_TIDB_URL: "mysql://root@localhost:4000/testdb"
        run: cargo test --manifest-path src-tauri/Cargo.toml --test tidb_integration

  test-sqlite:
    name: SQLite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev librsvg2-dev libappindicator3-dev patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Run SQLite integration tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --test sqlite_integration

  test-cassandra:
    name: Cassandra ${{ matrix.cassandra_version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cassandra_version: ["4.0", "4.1", "5.0"]
    services:
      cassandra:
        image: cassandra:${{ matrix.cassandra_version }}
        ports:
          - 9042:9042
        options: >-
          --health-cmd "cqlsh -e 'describe cluster'"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 15
          --health-start-period 90s
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev librsvg2-dev libappindicator3-dev patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Run Cassandra integration tests
        env:
          TEST_CASSANDRA_HOST: "127.0.0.1"
          TEST_CASSANDRA_PORT: "9042"
        run: cargo test --manifest-path src-tauri/Cargo.toml --test cassandra_integration

  test-scylladb:
    name: ScyllaDB ${{ matrix.scylla_version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        scylla_version: ["5.4", "6.2"]
    services:
      scylladb:
        image: scylladb/scylla:${{ matrix.scylla_version }}
        ports:
          - 9042:9042
        options: >-
          --health-cmd "cqlsh -e 'describe cluster'"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 15
          --health-start-period 90s
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev librsvg2-dev libappindicator3-dev patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Run ScyllaDB integration tests
        env:
          TEST_CASSANDRA_HOST: "127.0.0.1"
          TEST_CASSANDRA_PORT: "9042"
        run: cargo test --manifest-path src-tauri/Cargo.toml --test cassandra_integration

  release:
    name: Build & Release (${{ matrix.platform }})
    needs: [test-frontend, test-e2e, test-postgres, test-mysql, test-mariadb, test-mssql, test-cockroachdb, test-tidb, test-sqlite, test-cassandra, test-scylladb]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "npm"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "v__VERSION__"
          releaseBody: |
            ## Tablio v__VERSION__

            Database management tool for PostgreSQL, MySQL, MariaDB, SQL Server, SQLite, CockroachDB, TiDB, and Cassandra/ScyllaDB.

            See the assets below for installers and binaries.
            - **Windows**: `.msi` installer or `.exe` NSIS
            - **macOS**: `.dmg` (Intel and Apple Silicon)
            - **Linux**: `.deb` (Debian/Ubuntu), `.rpm` (Fedora/RHEL/SUSE), `.AppImage` (portable)
          releaseDraft: false
          prerelease: ${{ contains(github.ref, '-') }}
          args: ${{ matrix.args }}

  publish-aur:
    name: Publish to AUR
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Prepare AUR package
        run: |
          VERSION=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" dist/aur/PKGBUILD

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.2
        with:
          pkgname: tablio-bin
          pkgbuild: dist/aur/PKGBUILD
          assets: |
            dist/aur/tablio-bin.install
          updpkgsums: false
          commit_username: dasunNimantha
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ github.ref_name }}"
          force_push: true

  publish-flatpak:
    name: Update Flathub
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Extract version and compute hash
        id: info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          DEB_URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/Tablio_${VERSION}_amd64.deb"
          for i in $(seq 1 30); do
            if curl -fsSL -o /tmp/tablio.deb "$DEB_URL" 2>/dev/null; then
              break
            fi
            echo "Waiting for .deb asset... (attempt $i/30)"
            sleep 30
          done
          SHA=$(sha256sum /tmp/tablio.deb | awk '{print $1}')
          echo "sha256=${SHA}" >> "$GITHUB_OUTPUT"
          echo "deb_url=${DEB_URL}" >> "$GITHUB_OUTPUT"

      - name: Check if Flathub repo exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh repo view flathub/com.tablio.app --json name >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Flathub repo not found yet, skipping."
          fi

      - name: Update Flathub manifest
        if: steps.check.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.info.outputs.version }}"
          SHA="${{ steps.info.outputs.sha256 }}"
          DEB_URL="${{ steps.info.outputs.deb_url }}"

          git clone https://x-access-token:${GH_TOKEN}@github.com/flathub/com.tablio.app.git /tmp/flathub-tablio
          cd /tmp/flathub-tablio

          sed -i "s|url: https://github.com/.*/releases/download/.*/Tablio_.*_amd64.deb|url: ${DEB_URL}|" com.tablio.app.yml
          sed -i "s/sha256: .*/sha256: ${SHA}/" com.tablio.app.yml

          EXISTING=$(grep "version=\"${VERSION}\"" com.tablio.app.metainfo.xml || true)
          if [ -z "$EXISTING" ]; then
            sed -i "/<releases>/a\\    <release version=\"${VERSION}\" date=\"$(date +%Y-%m-%d)\"><description><p>See release notes on GitHub.</p></description></release>" com.tablio.app.metainfo.xml
          fi

          if git diff --quiet; then
            echo "No changes to submit"
          else
            BRANCH="update-v${VERSION}"
            git checkout -b "$BRANCH"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Update to v${VERSION}"
            git push origin "$BRANCH"
            gh pr create --repo flathub/com.tablio.app --base master --head "$BRANCH" \
              --title "Update to v${VERSION}" \
              --body "Automated update from [release v${VERSION}](https://github.com/${{ github.repository }}/releases/tag/v${VERSION})."
          fi

  publish-repos:
    name: Publish APT & RPM repositories
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: source

      - name: Install repo tools
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev apt-utils createrepo-c

      - name: Setup gh-pages working directory
        run: |
          REPO_URL="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          if git ls-remote --exit-code --heads "$REPO_URL" gh-pages >/dev/null 2>&1; then
            git clone --depth 1 --branch gh-pages "$REPO_URL" gh-pages
          else
            mkdir -p gh-pages
            pushd gh-pages
            git init -b gh-pages
            git remote add origin "$REPO_URL"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            echo "# Tablio Package Repositories" > README.md
            git add README.md
            git commit -m "Initialize gh-pages branch"
            git push origin gh-pages
            popd
          fi
          mkdir -p gh-pages/apt/pool gh-pages/apt/dists/stable/main/binary-amd64
          mkdir -p gh-pages/rpm/packages
          touch gh-pages/.nojekyll

      - name: Extract version
        id: version
        run: echo "version=$(grep '^version' source/src-tauri/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')" >> "$GITHUB_OUTPUT"

      - name: Download packages from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v${VERSION}"
          echo "Looking for packages in release $TAG..."
          for i in $(seq 1 30); do
            ASSETS=$(gh release view "$TAG" --repo "${{ github.repository }}" --json assets --jq '.assets[].name' 2>/dev/null || true)
            if echo "$ASSETS" | grep -qE '\.(deb|rpm)$'; then
              echo "Found package assets:"
              echo "$ASSETS" | grep -E '\.(deb|rpm)$'
              break
            fi
            echo "Waiting for package assets... (attempt $i/30)"
            sleep 30
          done
          gh release download "$TAG" --repo "${{ github.repository }}" --pattern "*.deb" --dir gh-pages/apt/pool --clobber
          gh release download "$TAG" --repo "${{ github.repository }}" --pattern "*.rpm" --dir gh-pages/rpm/packages --clobber
          echo "Downloaded APT:"
          ls -la gh-pages/apt/pool/
          echo "Downloaded RPM:"
          ls -la gh-pages/rpm/packages/

      - name: Import GPG key
        run: |
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          echo "allow-loopback-pinentry" > ~/.gnupg/gpg-agent.conf
          echo "pinentry-mode loopback" > ~/.gnupg/gpg.conf
          gpgconf --kill gpg-agent || true
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          GPG_KEY_ID=$(gpg --list-secret-keys --keyid-format LONG 2>/dev/null | grep '^sec' | head -1 | awk '{print $2}' | cut -d'/' -f2)
          echo "GPG_KEY_ID=$GPG_KEY_ID" >> "$GITHUB_ENV"
          echo "Using GPG key: $GPG_KEY_ID"

      - name: Export public key
        run: |
          gpg --armor --export "$GPG_KEY_ID" > gh-pages/apt/key.gpg
          cp gh-pages/apt/key.gpg gh-pages/rpm/key.gpg

      - name: Generate APT metadata and sign
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          cd gh-pages/apt

          dpkg-scanpackages --multiversion pool > dists/stable/main/binary-amd64/Packages
          gzip -k -f dists/stable/main/binary-amd64/Packages

          printf '%s\n' \
            "Origin: Tablio" \
            "Label: Tablio" \
            "Suite: stable" \
            "Codename: stable" \
            "Architectures: amd64" \
            "Components: main" \
            "Description: Tablio APT repository" \
            > dists/stable/Release

          apt-ftparchive release dists/stable >> dists/stable/Release

          echo "$GPG_PASSPHRASE" > /tmp/gpg-pass

          gpg --batch --yes --pinentry-mode loopback --passphrase-file /tmp/gpg-pass \
            --default-key "$GPG_KEY_ID" -abs -o dists/stable/Release.gpg dists/stable/Release

          gpg --batch --yes --pinentry-mode loopback --passphrase-file /tmp/gpg-pass \
            --default-key "$GPG_KEY_ID" --clearsign -o dists/stable/InRelease dists/stable/Release

          rm -f /tmp/gpg-pass

          echo "APT metadata generated successfully:"
          ls -la dists/stable/
          ls -la dists/stable/main/binary-amd64/

      - name: Generate RPM metadata and sign
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          cd gh-pages/rpm
          createrepo_c --update .

          echo "$GPG_PASSPHRASE" > /tmp/gpg-pass

          gpg --batch --yes --pinentry-mode loopback --passphrase-file /tmp/gpg-pass \
            --default-key "$GPG_KEY_ID" --detach-sign --armor repodata/repomd.xml

          rm -f /tmp/gpg-pass

          printf '%s\n' \
            '[tablio]' \
            'name=Tablio' \
            'baseurl=https://dasunnimantha.github.io/tablio/rpm' \
            'enabled=1' \
            'gpgcheck=0' \
            'gpgkey=https://dasunnimantha.github.io/tablio/rpm/key.gpg' \
            'repo_gpgcheck=1' \
            > tablio.repo

          echo "RPM metadata generated successfully:"
          ls -la repodata/

      - name: Deploy to GitHub Pages
        run: |
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to deploy"
          else
            git commit -m "Update repos for v${{ steps.version.outputs.version }}"
            git push origin gh-pages
            echo "Deployed successfully"
          fi
