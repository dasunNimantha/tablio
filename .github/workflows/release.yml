name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Frontend tests
        run: npm run test

  test-postgres:
    name: Postgres ${{ matrix.pg_version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pg_version: ["14", "15", "16", "17", "18"]
    services:
      postgres:
        image: postgres:${{ matrix.pg_version }}
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev librsvg2-dev libappindicator3-dev patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Run unit + Postgres integration tests
        env:
          TEST_POSTGRES_URL: "postgres://test:test@localhost:5432/testdb"
        run: |
          cargo test --manifest-path src-tauri/Cargo.toml --lib
          cargo test --manifest-path src-tauri/Cargo.toml --test postgres_integration

  test-mysql:
    name: MySQL ${{ matrix.mysql_version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mysql_version: ["8.0", "8.4"]
    services:
      mysql:
        image: mysql:${{ matrix.mysql_version }}
        env:
          MYSQL_ROOT_PASSWORD: test
          MYSQL_DATABASE: testdb
          MYSQL_USER: test
          MYSQL_PASSWORD: test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev librsvg2-dev libappindicator3-dev patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Run MySQL integration tests
        env:
          TEST_MYSQL_URL: "mysql://root:test@localhost:3306/testdb"
        run: cargo test --manifest-path src-tauri/Cargo.toml --test mysql_integration

  test-mariadb:
    name: MariaDB ${{ matrix.mariadb_version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mariadb_version: ["10.11", "11.4"]
    services:
      mariadb:
        image: mariadb:${{ matrix.mariadb_version }}
        env:
          MARIADB_ROOT_PASSWORD: test
          MARIADB_DATABASE: testdb
          MARIADB_USER: test
          MARIADB_PASSWORD: test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev librsvg2-dev libappindicator3-dev patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Run MariaDB integration tests
        env:
          TEST_MARIADB_URL: "mysql://root:test@localhost:3306/testdb"
        run: cargo test --manifest-path src-tauri/Cargo.toml --test mariadb_integration

  test-cockroachdb:
    name: CockroachDB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start CockroachDB
        run: |
          docker run -d --name crdb -p 26257:26257 cockroachdb/cockroach:latest start-single-node --insecure
          for i in $(seq 1 30); do
            if docker exec crdb cockroach sql --insecure -e "SELECT 1" >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          docker exec crdb cockroach sql --insecure -e "CREATE DATABASE testdb;"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev librsvg2-dev libappindicator3-dev patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Run CockroachDB integration tests
        env:
          TEST_COCKROACHDB_URL: "postgres://root@localhost:26257/testdb?sslmode=disable"
        run: cargo test --manifest-path src-tauri/Cargo.toml --test cockroachdb_integration

  test-tidb:
    name: TiDB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start TiDB
        run: |
          docker run -d --name tidb -p 4000:4000 pingcap/tidb:latest
          for i in $(seq 1 30); do
            if mysql -h 127.0.0.1 -P 4000 -u root --skip-password -e "SELECT 1" >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          mysql -h 127.0.0.1 -P 4000 -u root --skip-password -e "CREATE DATABASE testdb;"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev librsvg2-dev libappindicator3-dev patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Run TiDB integration tests
        env:
          TEST_TIDB_URL: "mysql://root@localhost:4000/testdb"
        run: cargo test --manifest-path src-tauri/Cargo.toml --test tidb_integration

  test-sqlite:
    name: SQLite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev librsvg2-dev libappindicator3-dev patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Run SQLite integration tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --test sqlite_integration

  release:
    name: Build & Release (${{ matrix.platform }})
    needs: [test-frontend, test-postgres, test-mysql, test-mariadb, test-cockroachdb, test-tidb, test-sqlite]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "Tablio v__VERSION__"
          releaseBody: |
            ## Tablio v__VERSION__

            Database management tool for Postgres, MySQL, and SQLite.

            See the assets below for installers and binaries.
            - **Windows**: `.msi` installer or `.exe` NSIS
            - **macOS**: `.dmg` (Intel and Apple Silicon)
            - **Linux**: `.deb` (Debian/Ubuntu), `.AppImage` (portable)
          releaseDraft: true
          prerelease: ${{ contains(github.ref, '-') }}
          args: ${{ matrix.args }}

  ppa-upload:
    name: Upload to PPA (${{ matrix.distro }})
    needs: [test-frontend, test-postgres, test-mysql, test-mariadb, test-cockroachdb, test-tidb, test-sqlite]
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        include:
          - distro: noble
            suffix: ""
          - distro: jammy
            suffix: "~jammy1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y devscripts debhelper dput

      - name: Build frontend
        run: |
          npm ci
          npm run build

      - name: Vendor Cargo dependencies
        run: |
          cd src-tauri
          mkdir -p .cargo
          cargo vendor vendor > .cargo/config.toml

      - name: Extract version
        id: version
        run: echo "version=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')" >> "$GITHUB_OUTPUT"

      - name: Update changelog for target distro
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SUFFIX="${{ matrix.suffix }}"
          sed -i "1s/.*/tablio (${VERSION}-0ppa1${SUFFIX}) ${{ matrix.distro }}; urgency=medium/" debian/changelog

      - name: Clean up build artifacts
        run: rm -rf node_modules src-tauri/target

      - name: Create orig tarball
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          tar --exclude='.git' \
              -czf "../tablio_${VERSION}.orig.tar.gz" \
              -C .. tablio

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          GPG_KEY_ID=$(gpg --list-secret-keys --keyid-format LONG | grep sec | head -1 | awk '{print $2}' | cut -d'/' -f2)
          echo "GPG_KEY_ID=${GPG_KEY_ID}" >> "$GITHUB_ENV"

      - name: Build source package
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          dpkg-buildpackage -us -uc -S -sa -d
          VERSION="${{ steps.version.outputs.version }}"
          SUFFIX="${{ matrix.suffix }}"
          CHANGES="../tablio_${VERSION}-0ppa1${SUFFIX}_source.changes"
          if [ -n "$GPG_PASSPHRASE" ]; then
            echo "${GPG_PASSPHRASE}" > /tmp/gpg-pass
            debsign -k"${GPG_KEY_ID}" \
              -p"gpg --batch --pinentry-mode loopback --passphrase-file /tmp/gpg-pass" \
              "${CHANGES}"
            rm -f /tmp/gpg-pass
          else
            debsign -k"${GPG_KEY_ID}" "${CHANGES}"
          fi

      - name: Upload to PPA
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SUFFIX="${{ matrix.suffix }}"
          dput ppa:dasun777/tablio "../tablio_${VERSION}-0ppa1${SUFFIX}_source.changes"
