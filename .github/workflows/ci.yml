name: CI

on:
  pull_request:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'src-tauri/**'

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "npm"

      - run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm run test

  fmt-and-clippy:
    name: Format & Clippy
    needs: [changes]
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev librsvg2-dev libappindicator3-dev patchelf

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Check formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

  test-postgres:
    name: Postgres ${{ matrix.pg_version }}
    needs: [changes]
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pg_version: ["14", "15", "16", "17", "18"]
    services:
      postgres:
        image: postgres:${{ matrix.pg_version }}
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev librsvg2-dev libappindicator3-dev patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Run unit + Postgres integration tests
        env:
          TEST_POSTGRES_URL: "postgres://test:test@localhost:5432/testdb"
        run: |
          cargo test --manifest-path src-tauri/Cargo.toml --lib
          cargo test --manifest-path src-tauri/Cargo.toml --test postgres_integration

  test-mysql:
    name: MySQL ${{ matrix.mysql_version }}
    needs: [changes]
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mysql_version: ["8.0", "8.4"]
    services:
      mysql:
        image: mysql:${{ matrix.mysql_version }}
        env:
          MYSQL_ROOT_PASSWORD: test
          MYSQL_DATABASE: testdb
          MYSQL_USER: test
          MYSQL_PASSWORD: test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev librsvg2-dev libappindicator3-dev patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Run MySQL integration tests
        env:
          TEST_MYSQL_URL: "mysql://root:test@localhost:3306/testdb"
        run: cargo test --manifest-path src-tauri/Cargo.toml --test mysql_integration

  test-mariadb:
    name: MariaDB ${{ matrix.mariadb_version }}
    needs: [changes]
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mariadb_version: ["10.11", "11.4"]
    services:
      mariadb:
        image: mariadb:${{ matrix.mariadb_version }}
        env:
          MARIADB_ROOT_PASSWORD: test
          MARIADB_DATABASE: testdb
          MARIADB_USER: test
          MARIADB_PASSWORD: test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev librsvg2-dev libappindicator3-dev patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Run MariaDB integration tests
        env:
          TEST_MARIADB_URL: "mysql://root:test@localhost:3306/testdb"
        run: cargo test --manifest-path src-tauri/Cargo.toml --test mariadb_integration

  test-cockroachdb:
    name: CockroachDB
    needs: [changes]
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Start CockroachDB
        run: |
          docker run -d --name crdb -p 26257:26257 cockroachdb/cockroach:latest start-single-node --insecure
          for i in $(seq 1 30); do
            if docker exec crdb cockroach sql --insecure -e "SELECT 1" >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          docker exec crdb cockroach sql --insecure -e "CREATE DATABASE testdb;"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev librsvg2-dev libappindicator3-dev patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Run CockroachDB integration tests
        env:
          TEST_COCKROACHDB_URL: "postgres://root@localhost:26257/testdb?sslmode=disable"
        run: cargo test --manifest-path src-tauri/Cargo.toml --test cockroachdb_integration

  test-tidb:
    name: TiDB
    needs: [changes]
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Start TiDB
        run: |
          docker run -d --name tidb -p 4000:4000 pingcap/tidb:latest
          for i in $(seq 1 30); do
            if mysql -h 127.0.0.1 -P 4000 -u root --skip-password -e "SELECT 1" >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          mysql -h 127.0.0.1 -P 4000 -u root --skip-password -e "CREATE DATABASE testdb;"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev librsvg2-dev libappindicator3-dev patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Run TiDB integration tests
        env:
          TEST_TIDB_URL: "mysql://root@localhost:4000/testdb"
        run: cargo test --manifest-path src-tauri/Cargo.toml --test tidb_integration

  test-sqlite:
    name: SQLite
    needs: [changes]
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev librsvg2-dev libappindicator3-dev patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Run SQLite integration tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --test sqlite_integration

  test-cassandra:
    name: Cassandra ${{ matrix.cassandra_version }}
    needs: [changes]
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cassandra_version: ["4.0", "4.1", "5.0"]
    services:
      cassandra:
        image: cassandra:${{ matrix.cassandra_version }}
        ports:
          - 9042:9042
        options: >-
          --health-cmd "cqlsh -e 'describe cluster'"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 15
          --health-start-period 90s
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev librsvg2-dev libappindicator3-dev patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Run Cassandra integration tests
        env:
          TEST_CASSANDRA_HOST: "127.0.0.1"
          TEST_CASSANDRA_PORT: "9042"
        run: cargo test --manifest-path src-tauri/Cargo.toml --test cassandra_integration

  test-scylladb:
    name: ScyllaDB ${{ matrix.scylla_version }}
    needs: [changes]
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        scylla_version: ["5.4", "6.2"]
    services:
      scylladb:
        image: scylladb/scylla:${{ matrix.scylla_version }}
        ports:
          - 9042:9042
        options: >-
          --health-cmd "cqlsh -e 'describe cluster'"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 15
          --health-start-period 90s
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev librsvg2-dev libappindicator3-dev patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Run ScyllaDB integration tests
        env:
          TEST_CASSANDRA_HOST: "127.0.0.1"
          TEST_CASSANDRA_PORT: "9042"
        run: cargo test --manifest-path src-tauri/Cargo.toml --test cassandra_integration

  build:
    name: Build
    needs: [changes, test-frontend, fmt-and-clippy, test-postgres, test-mysql, test-mariadb, test-cockroachdb, test-tidb, test-sqlite, test-cassandra, test-scylladb]
    if: ${{ !failure() && !cancelled() }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "npm"

      - run: npm ci

      - name: Build frontend only
        if: needs.changes.outputs.backend != 'true'
        run: npm run build

      - name: Install Linux dependencies
        if: needs.changes.outputs.backend == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@stable
        if: needs.changes.outputs.backend == 'true'

      - uses: swatinem/rust-cache@v2
        if: needs.changes.outputs.backend == 'true'
        with:
          workspaces: src-tauri

      - name: Build Tauri app
        if: needs.changes.outputs.backend == 'true'
        run: npx tauri build
